  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#FBFAF8',
            charcoal: '#333333',
            moss: '#3F6D0D',
            'moss-light': '#4A7A15',

  <style>
    body {
      background-color: #FBFAF8;
      color: #333333;
      overflow-x: hidden;
      font-optical-sizing: auto;
    }

    /* Custom scrollbar for premium feel */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #FBFAF8;
    }

    ::-webkit-scrollbar-thumb {
      background: #D1D5DB;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #9CA3AF;
    }

    /* 3D Flip Utilities */
    .perspective-1000 {
      perspective: 1000px;
    }

    .preserve-3d {
      transform-style: preserve-3d;
    }

    .backface-hidden {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .rotate-y-180 {
      transform: rotateY(180deg);
    }

    /* Water Ripple Animation */
    @keyframes ripple {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(-50%, -50%) scale(25);
        opacity: 0;
      }
    }
  </style>
